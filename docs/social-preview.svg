<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="5" height="320" fill="url(#accent)" rx="2"/>

  <!-- Top label -->
  <text x="108" y="198" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#f97316" letter-spacing="4">HACKARANDAS.COM</text>

  <!-- Main title -->
  <text x="108" y="298" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="-1">Claude Security Toolbelt</text>

  <!-- Subtitle -->
  <text x="110" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#8b949e">Rules · Commands · Skills for Security Engineering</text>

  <!-- Divider -->
  <line x1="108" y1="400" x2="600" y2="400" stroke="#30363d" stroke-width="1"/>

  <!-- Pills -->
  <rect x="108" y="422" width="130" height="38" rx="19" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="173" y="446" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7ee787" text-anchor="middle">3 skills</text>

  <rect x="252" y="422" width="160" height="38" rx="19" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="332" y="446" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#79c0ff" text-anchor="middle">2 commands</text>

  <rect x="426" y="422" width="140" height="38" rx="19" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="496" y="446" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#d2a8ff" text-anchor="middle">9 rules</text>

  <!-- Right side — toolbox icon area -->
  <text x="1050" y="360" font-size="180" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">🧰</text>

  <!-- Bottom — repo path -->
  <text x="108" y="556" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#484f58">github.com/ch0ks/hackarandas-claude-toolbelt</text>

  <!-- MIT badge -->
  <rect x="108" y="572" width="74" height="24" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="145" y="589" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="middle">MIT</text>
</svg>
